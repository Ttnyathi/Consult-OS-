<aside class="sidebar">

    <div class="brand">
        <div class="brand-logo">TK</div>

        <div class="brand-text">
            <h2>TK Konsult</h2>
            <span>Management Suite</span>
        </div>
    </div>
    <style>
        .sidebar-logout-form {
            margin: 0;
        }

        .logout-link {
            width: 100%;
            border: none;
            background: none;
            color: inherit;
            font: inherit;
            text-align: left;
            cursor: pointer;

            display: flex;
            align-items: center;
            gap: 12px;

            padding: 12px 16px;
            border-radius: 10px;
        }

        .logout-link:hover {
            background: rgba(255,255,255,0.08);
        }
    </style>
    <nav class="sidebar-nav">

        <p class="nav-heading">Main</p>

        <a href="{% url 'management:admin_dashboard' %}" class="nav-link active">
            <span>▦</span>
            Dashboard
        </a>

        <a href="{% url 'management:admin_projects' %}" class="nav-link">
            <span>◈</span>
            Projects
        </a>

        <a href="{% url 'management:admin_clients' %}" class="nav-link">
            <span>●</span>
            Clients
        </a>

        <p class="nav-heading">Operations</p>

        <a href="{% url 'management:admin_staff' %}" class="nav-link">
            <span>◌</span>
            Staff
        </a>

        <a href="{% url 'management:admin_services' %}" class="nav-link">
            <span>▧</span>
            Services
        </a>

        <a href="{% url 'management:admin_documents' %}" class="nav-link">
            <span>▤</span>
            Documents
        </a>

        <a href="{% url 'management:admin_payments' %}" class="nav-link">
            <span>$</span>
            Payments
        </a>
        
        <form method="post" action="{% url 'management:logout' %}" class="sidebar-logout-form">
            {% csrf_token %}
            <button type="submit" class="sidebar-link logout-link">
                <span>⎋</span>
                Logout
            </button>
        </form>
    </nav>

    <div class="sidebar-user">

        <div class="user-avatar">
            {{ request.user.username|slice:":2"|upper }}
        </div>

        <div class="user-info">
            <strong>{{ request.user.username }}</strong>
            <small>Administrator</small>
        </div>

    </div>

</aside>
