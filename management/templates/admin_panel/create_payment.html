{% extends "admin_panel/base.html" %}

{% block title %}{{ title }}{% endblock %}
{% block header %}{{ title }}{% endblock %}

{% block content %}
  <section class="hero">
    <div>
      <h1>{{ title }}</h1>
      <p>Add or update a payment against a project and keep project payment status in sync.</p>
    </div>
  </section>
  <form class="form-card form-grid" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="primary" type="submit">Save payment</button>
  </form>
{% endblock %}
