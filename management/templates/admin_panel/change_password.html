<!doctype html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password | TK Research</title>
  <link rel="stylesheet" href="{% static 'management/styles.css' %}">
</head>
<body class="login-page">
  <main class="shell">
    <section class="intro">
      <a class="brand" href="/">TK Research</a>
      <div>
        <h1>Change your password</h1>
        <p>You are using a temporary password. Create a private password before continuing.</p>
      </div>
    </section>
    <section class="panel">
      <h2>Set new password</h2>
      <p class="hint">Enter your temporary password, then choose and confirm a new password.</p>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Update password</button>
      </form>
    </section>
  </main>
</body>
</html>
