{% extends "client_panel/base.html" %}
{% block title %}Change Password{% endblock %}
{% block header %}Change Password{% endblock %}
{% block content %}
  <section class="hero"><div><h1>Change password</h1><p>Create a private password before continuing.</p></div></section>
  <form class="form-card form-grid form-wide" method="post">{% csrf_token %}{{ form.as_p }}<div class="form-actions"><button class="primary" type="submit">Update password</button></div></form>
{% endblock %}
