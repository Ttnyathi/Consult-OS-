<aside class="sidebar">
  <a class="brand" href="{% url 'staff:staff_dashboard' %}">TK Research</a>
  <div>
    <div class="side-label">Staff Portal</div>
    <nav class="side-nav">
      <a href="{% url 'staff:staff_dashboard' %}">Dashboard</a>
      <a href="{% url 'staff:staff_projects' %}">My Projects</a>
      <a href="{% url 'staff:staff_documents' %}">Documents</a>
      <a href="{% url 'staff:staff_notifications' %}">Notifications{% if unread_notification_count %} ({{ unread_notification_count }}){% endif %}</a>
      <a href="{% url 'staff:staff_profile' %}">Profile</a>
      {% if request.user.staff_profile.role == "Admin" %}
        <a href="{% url 'management:admin_dashboard' %}">Admin Panel</a>
      {% endif %}
    </nav>
  </div>
  <div class="side-footer">
    <span>Signed in as {{ request.user.username }}</span>
    <form method="post" action="{% url 'staff:logout' %}">
      {% csrf_token %}
      <button class="logout" type="submit">Logout</button>
    </form>
  </div>
</aside>
