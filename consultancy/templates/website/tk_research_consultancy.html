<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TK Research </title>
    <style src="consultancy/static"></style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  </head>
  <body>
    <div id="root"></div>
    {% verbatim %}
    <script>
      const { useEffect, useRef, useState } = React;
      const h = React.createElement;
      const NAV = [
        ["Overview", "/"],
        ["Our Work", "/work/"],
        ["Our People", "/people/"],
        ["Our Insights", "/insights/"],
        ["Careers", "/careers/"],
        ["Contact Us", "/contact/"],
      ];

      function Header() {
        return h(
          "header",
          { style: { height: 64, borderBottom: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 40px", background: "#0A1628" } },
          h("a", { href: "/", style: { width: 220, textDecoration: "none" } },
            h("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#fff", lineHeight: 1.05 } }, "TK Research"),
            h("div", { style: { fontSize: 10, letterSpacing: 2.5, textTransform: "uppercase", color: "rgba(255,255,255,0.45)", marginTop: 2 } }, "& Company")
          ),
          h("nav", { style: { display: "flex", flexDirection: "column", alignItems: "center" } },
            h("div", { style: { fontSize: 11, color: "#4EA8E0", fontWeight: 500, letterSpacing: 0.5, marginBottom: 5 } }, "ZA"),
            h("div", { style: { display: "flex", alignItems: "center" } },
              NAV.map(([label, href], index) =>
                h("a", { key: label, href, style: { position: "relative", color: index === 0 ? "#4EA8E0" : "rgba(255,255,255,0.6)", fontSize: 13, textDecoration: "none", padding: index === 0 ? "0 14px 0 0" : "0 14px" } },
                  label,
                  index === 0 ? h("span", { style: { position: "absolute", left: 0, right: 14, bottom: -4, height: 2, background: "#4EA8E0" } }) : null
                )
              )
            )
          ),
          h("div", { style: { width: 220, display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 12, color: "rgba(255,255,255,0.55)", fontSize: 13 } },
            h("a", { href: "/panel/login/", style: { color: "rgba(255,255,255,0.55)", textDecoration: "none" } }, "Sign In"),
            h("span", null, "|"),
            h("a", { href: "/create-account/", style: { color: "rgba(255,255,255,0.55)", textDecoration: "none" } }, "Create Account"),
            h("svg", { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", style: { marginLeft: 4 } },
              h("circle", { cx: 10.8, cy: 10.8, r: 6.4, stroke: "rgba(255,255,255,0.55)", strokeWidth: 1.6 }),
              h("path", { d: "M16 16L21 21", stroke: "rgba(255,255,255,0.55)", strokeWidth: 1.6, strokeLinecap: "square" })
            )
          )
        );
      }

      function GlobeVisual() {
        const canvasRef = useRef(null);
        const pathsRef = useRef([]);
        const rafRef = useRef(0);
        const rotationRef = useRef(0);

        useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext("2d");
          const size = 320;
          const center = 160;
          const radius = 116;
          const wavePath = (index, time) => {
            const y = 330 - index * 21;
            const controlA = 420 - index * 13 + Math.sin(time * 0.0008 + index * 0.6) * 22;
            const controlB = 255 - index * 14 + Math.sin(time * 0.0008 + index * 0.6 + 1.4) * 22;
            return `M -80 ${y} Q 160 ${controlA} 330 ${controlB} T 760 ${92 - index * 9}`;
          };
          const project = (lonDeg, latDeg, rotation) => {
            const lon = (lonDeg * Math.PI) / 180 + rotation;
            const lat = (latDeg * Math.PI) / 180;
            return { x: center + radius * Math.cos(lat) * Math.sin(lon), y: center - radius * Math.sin(lat), visible: Math.cos(lon) > -0.18 };
          };
          const draw = (time) => {
            ctx.clearRect(0, 0, size, size);
            rotationRef.current += 0.003;
            const rotation = rotationRef.current;
            const base = ctx.createRadialGradient(center - 34, center - 38, 12, center, center, radius);
            base.addColorStop(0, "#1E5090");
            base.addColorStop(1, "#061228");
            ctx.beginPath();
            ctx.arc(center, center, radius, 0, Math.PI * 2);
            ctx.fillStyle = base;
            ctx.fill();
            ctx.save();
            ctx.beginPath();
            ctx.arc(center, center, radius, 0, Math.PI * 2);
            ctx.clip();
            ctx.strokeStyle = "rgba(78,168,224,0.45)";
            ctx.lineWidth = 0.8;
            for (let i = -3; i <= 3; i += 1) {
              const lat = (i / 4) * (Math.PI / 2);
              ctx.beginPath();
              ctx.ellipse(center, center + Math.sin(lat) * radius, Math.cos(lat) * radius, Math.max(8, Math.abs(Math.sin(Math.acos(Math.cos(lat)))) * 25), 0, 0, Math.PI * 2);
              ctx.stroke();
            }
            for (let i = 0; i < 8; i += 1) {
              ctx.beginPath();
              ctx.ellipse(center, center, radius * Math.abs(Math.cos(rotation + i * Math.PI / 8)), radius, 0, 0, Math.PI * 2);
              ctx.stroke();
            }
            ctx.restore();
            ctx.beginPath();
            ctx.arc(center, center, radius, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(78,168,224,0.5)";
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(center, center, radius + 4, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(78,168,224,0.12)";
            ctx.lineWidth = 8;
            ctx.stroke();
            const zim = project(30, -20, rotation);
            const pulse = (time % 2000) / 2000;
            if (zim.visible) {
              for (let i = 0; i < 2; i += 1) {
                const p = (pulse + i * 0.5) % 1;
                ctx.beginPath();
                ctx.arc(zim.x, zim.y, 8 + p * 14, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(126,203,245,${0.6 * (1 - p)})`;
                ctx.lineWidth = 1;
                ctx.stroke();
              }
              ctx.beginPath();
              ctx.arc(zim.x, zim.y, 5, 0, Math.PI * 2);
              ctx.fillStyle = "#7ECBF5";
              ctx.fill();
            }
          };
          const frame = (time) => {
            pathsRef.current.forEach((path, index) => path && path.setAttribute("d", wavePath(index, time)));
            draw(time);
            rafRef.current = requestAnimationFrame(frame);
          };
          rafRef.current = requestAnimationFrame(frame);
          return () => cancelAnimationFrame(rafRef.current);
        }, []);

        return h("section", { style: { position: "relative", overflow: "hidden", height: "100%", minHeight: 0, background: "#0A1628" } },
          h("div", { style: { position: "absolute", inset: 0, background: "radial-gradient(ellipse at 60% 50%, rgba(20,70,160,0.3) 0%, transparent 65%)", pointerEvents: "none" } }),
          h("svg", { viewBox: "0 0 680 500", preserveAspectRatio: "xMidYMid slice", style: { position: "absolute", inset: 0, width: "100%", height: "100%" } },
            Array.from({ length: 12 }).map((_, index) =>
              h("path", { key: index, ref: (node) => { pathsRef.current[index] = node; }, d: `M -80 ${330 - index * 21} Q 160 ${420 - index * 13} 330 ${255 - index * 14} T 760 ${92 - index * 9}`, fill: "none", stroke: index === 4 ? "#7ECBF5" : "#4EA8E0", strokeWidth: index === 4 ? 1.4 : index % 2 === 0 ? 0.7 : 1.2, opacity: index === 4 ? 0.75 : 0.2 + index * 0.04 })
            )
          ),
          h("canvas", { ref: canvasRef, width: 320, height: 320, style: { position: "absolute", width: 320, height: 320, left: "50%", top: "46%", transform: "translate(-50%, -50%)" } }),
          h("div", { style: { position: "absolute", left: "50%", top: "calc(46% + 168px)", transform: "translateX(-50%)", textAlign: "center", pointerEvents: "none", minWidth: 220 } },
            h("div", { style: { fontSize: 18, letterSpacing: 4, textTransform: "uppercase", color: "#7ECBF5", fontWeight: 700, textShadow: "0 0 22px rgba(126,203,245,0.3)" } }, "Z-A"),
            h("div", { style: { fontSize: 14, letterSpacing: 2.5, textTransform: "uppercase", color: "rgba(255,255,255,0.78)", marginTop: 6, fontWeight: 700 } }, "#1 RANKED")
          ),
          h("div", { style: { position: "absolute", top: 32, right: 32, background: "rgba(10,22,40,0.75)", border: "1px solid rgba(78,168,224,0.35)", padding: "12px 18px" } },
            h("div", { style: { fontSize: 10, letterSpacing: 2, color: "#4EA8E0", marginBottom: 5, fontWeight: 500 } }, "TOP RANKED"),
            h("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: 20, fontWeight: 700, color: "#fff" } }, "Z-A")
          )
        );
      }

      function Hero() {
        const [hover, setHover] = useState(false);
        return h("section", { style: { minHeight: "100vh", display: "flex", flexDirection: "column", background: "#0A1628", color: "#fff" } },
          h(Header),
          h("div", { style: { flex: 1, minHeight: 0, display: "grid", gridTemplateColumns: "1fr 1fr" } },
            h("section", { style: { padding: "60px 40px 52px", display: "flex", flexDirection: "column", justifyContent: "flex-end" } },
              h("div", { style: { fontSize: 14, color: "rgba(255,255,255,0.5)", fontWeight: 300, marginBottom: 10 } }, "Welcome to"),
              h("h1", { style: { fontFamily: "'Playfair Display', serif", fontSize: 62, fontWeight: 700, lineHeight: 1.04, color: "#fff", margin: "0 0 28px" } },
                h("span", { style: { display: "block" } }, "TK Research"),
                h("span", { style: { display: "block" } }, "Z--A's Leading Research and Consultancy Agency")
              ),
              h("p", { style: { maxWidth: 560, color: "rgba(255,255,255,0.62)", fontSize: 16, lineHeight: 1.75, margin: "0 0 24px" } }, "Evidence-led research, analytics, academic support, and advisory work for organisations, founders, development teams, and postgraduate researchers."),
              h("a", { href: "/work/", onMouseEnter: () => setHover(true), onMouseLeave: () => setHover(false), style: { alignSelf: "flex-start", display: "inline-flex", gap: 6, color: "#fff", fontSize: 13, fontWeight: 500, textDecoration: "none", borderBottom: `1px solid ${hover ? "#fff" : "rgba(255,255,255,0.35)"}`, paddingBottom: 2 } },
                "Explore our work across Z--A's key sectors",
                h("span", null, "->")
              )
            ),
            h(GlobeVisual)
          ),
          h("footer", { style: { height: 48, borderTop: "1px solid rgba(255,255,255,0.07)", background: "rgba(255,255,255,0.02)", display: "flex", alignItems: "center", padding: "0 40px", gap: 28, overflow: "hidden" } },
            [["Research", "Analytics"], ["Consultancy", "Advisory"], ["500+", "Deliverables"], ["95%", "Satisfaction"], ["12+", "Specialist Areas"]].map(([bold, rest], index) =>
              h("div", { key: bold, style: { display: "flex", alignItems: "center", gap: 28, fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", whiteSpace: "nowrap" } },
                h("span", null, h("span", { style: { color: "rgba(255,255,255,0.7)", fontWeight: 500 } }, bold), h("span", { style: { color: "rgba(255,255,255,0.32)", fontWeight: 300 } }, ` ${rest}`)),
                index < 4 ? h("span", { style: { color: "rgba(255,255,255,0.32)" } }, "·") : null
              )
            )
          )
        );
      }

      function AgencyCard({ icon, title, copy, items, href, blue }) {
        return h("article", { style: { background: "#fff", border: "1px solid #e0e5f2", borderRadius: 14, padding: 30, boxShadow: "0 18px 45px rgba(42,50,96,.1)", minHeight: 330 } },
          h("div", { style: { width: 64, height: 64, borderRadius: "50%", display: "grid", placeItems: "center", background: blue ? "linear-gradient(135deg,#e8f4ff,#dcecff)" : "linear-gradient(135deg,#eee9ff,#ded8ff)", color: blue ? "#1474d4" : "#5548db", fontSize: 30, marginBottom: 18 } }, icon),
          h("h2", { style: { margin: "0 0 8px", color: "#07133f", fontSize: 19 } }, title),
          h("p", { style: { fontSize: 14, color: "#596079", lineHeight: 1.65, margin: "0 0 20px" } }, copy),
          h("div", { style: { width: 42, height: 3, background: blue ? "#1474d4" : "#5a45e8", margin: "22px 0" } }),
          h("ul", { style: { display: "grid", gap: 11, margin: 0, padding: 0, listStyle: "none" } },
            items.map((item) => h("li", { key: item, style: { display: "flex", justifyContent: "space-between", borderTop: "1px solid #e1e6f3", paddingTop: 11, color: "#343b5e", fontSize: 14 } }, item, h("span", null, "›")))
          ),
          h("a", { href, style: { display: "inline-flex", marginTop: 20, color: blue ? "#1474d4" : "#4f42dd", fontWeight: 700, fontSize: 14, textDecoration: "none" } }, "View all services ->")
        );
      }

      function Metric({ value, label }) {
        return h("div", { style: { background: "#fff", border: "1px solid #e0e5f2", borderRadius: 14, padding: 26, boxShadow: "0 18px 45px rgba(42,50,96,.08)" } },
          h("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: 42, lineHeight: 1, color: "#4f42dd", fontWeight: 700 } }, value),
          h("div", { style: { color: "#596079", fontSize: 13, marginTop: 8, lineHeight: 1.5 } }, label)
        );
      }

      function Home() {
        return h(React.Fragment, null,
          h("style", null, "@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap'); html,body,#root{width:100%;min-height:100%;margin:0;padding:0;}*{box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:#fbfcff;color:#07133f}a{cursor:pointer}@media(max-width:900px){.home-grid,.metric-grid,.approach-row,.home-cta{grid-template-columns:1fr!important}.home-wrap{padding-left:24px!important;padding-right:24px!important}}"),
          h(Hero),
          h("main", { className: "home-wrap", style: { padding: "0 7.5% 72px", background: "linear-gradient(180deg,#fbfcff 0%,#f7f9ff 100%)" } },
            h("section", { className: "home-grid", style: { display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 16, marginTop: -34 } },
              h(AgencyCard, { icon: "⌁", title: "Academic & Research Support", copy: "End-to-end support for rigorous research and scholarly outputs.", href: "/work/", items: ["Dissertations & Theses", "Literature Reviews", "Methodology Design", "Data Interpretation & Editing", "Publication Support"] }),
              h(AgencyCard, { icon: "▣", title: "Project Consultancy", copy: "Practical support across the research and project lifecycle.", href: "/workflow/", blue: true, items: ["Monitoring & Evaluation", "Proposal Development", "Programme Reporting", "Stakeholder Documentation", "Advisory Support"] }),
              h(AgencyCard, { icon: "╂", title: "Analytics & Reporting", copy: "Transform data and evidence into clear insights and decisions.", href: "/insights/", items: ["Survey Analysis", "Dashboards & Visuals", "Insight Packs", "Business Intelligence", "Executive Reports"] })
            ),
            h("section", { style: { textAlign: "center", padding: "64px 0 30px" } },
              h("div", { style: { color: "#4f42dd", fontWeight: 700, fontSize: 14 } }, "Our Approach"),
              h("h2", { style: { fontFamily: "'Playfair Display', serif", fontSize: 32, margin: "8px 0 0", color: "#07133f" } }, "Research. Insight. Impact.")
            ),
            h("section", { className: "approach-row", style: { display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 28, alignItems: "start" } },
              [["1. Understand", "We clarify the problem and define the right questions."], ["2. Research", "We collect and analyse high-quality evidence."], ["3. Insight", "We turn findings into clear, actionable insights."], ["4. Impact", "We support decisions that create real-world impact."]].map(([title, copy], index) =>
                h("article", { key: title, style: { display: "grid", gridTemplateColumns: "58px 1fr", gap: 16, alignItems: "start" } },
                  h("div", { style: { width: 58, height: 58, borderRadius: "50%", display: "grid", placeItems: "center", background: index % 2 ? "#e7f2ff" : "#eee9ff", color: index % 2 ? "#1474d4" : "#5548db", fontSize: 28 } }, ["⌕", "□", "♢", "◎"][index]),
                  h("div", null,
                    h("h3", { style: { margin: "6px 0 6px", fontSize: 16, color: "#07133f" } }, title),
                    h("p", { style: { margin: 0, color: "#596079", fontSize: 13, lineHeight: 1.5 } }, copy)
                  )
                )
              )
            ),
            h("section", { className: "metric-grid", style: { display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 16, marginTop: 56 } },
              h(Metric, { value: "500+", label: "Research and advisory deliverables prepared for academic, business, and development clients." }),
              h(Metric, { value: "95%", label: "Client satisfaction across assignments shaped around clear delivery expectations." }),
              h(Metric, { value: "12+", label: "Specialist areas spanning research design, analytics, reporting, evaluation, and writing." }),
              h(Metric, { value: "#1", label: "Zimbabwe-focused research partner for decision-ready evidence and polished outputs." })
            ),
            h("section", { className: "home-cta", style: { marginTop: 54, borderRadius: 14, padding: "34px 44px", background: "linear-gradient(135deg,#4b2aa8,#2478ed)", color: "#fff", display: "grid", gridTemplateColumns: "1.1fr .9fr", gap: 30, alignItems: "center", overflow: "hidden" } },
              h("div", null,
                h("h2", { style: { fontFamily: "'Playfair Display', serif", fontSize: 30, margin: "0 0 8px" } }, "Let’s work together"),
                h("p", { style: { margin: 0, color: "rgba(255,255,255,.84)", fontSize: 15, lineHeight: 1.6 } }, "Partner with us for research that is rigorous, relevant, and ready for action.")
              ),
              h("div", { style: { display: "flex", gap: 18, justifyContent: "flex-end", flexWrap: "wrap" } },
                h("a", { href: "/contact/", style: { background: "#fff", color: "#07133f", padding: "14px 28px", borderRadius: 8, fontWeight: 700, textDecoration: "none" } }, "Get in touch ->"),
                h("a", { href: "/work/", style: { color: "#fff", padding: "14px 28px", borderRadius: 8, fontWeight: 700, border: "1px solid rgba(255,255,255,.6)", textDecoration: "none" } }, "View our work")
              )
            )
          )
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(Home));
    </script>
    {% endverbatim %}
  </body>
</html>
